<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mystery Manor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }
        #game-container {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        /* Rotate-device overlay for portrait mode */
        #rotate-overlay {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: #CCAA44;
        }
        #rotate-overlay .phone-icon {
            font-size: 64px;
            animation: rotateHint 2s ease-in-out infinite;
            margin-bottom: 20px;
        }
        #rotate-overlay .rotate-text {
            font-size: 18px;
            color: #8877AA;
            text-align: center;
            padding: 0 30px;
        }
        @keyframes rotateHint {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        @media (orientation: portrait) and (max-width: 1024px) {
            #rotate-overlay { display: flex !important; }
            #game-container { display: none !important; }
        }
        @media (orientation: landscape), (min-width: 1025px) {
            #rotate-overlay { display: none !important; }
            #game-container { display: block !important; }
        }
    </style>
</head>
<body>
    <div id="rotate-overlay">
        <div class="phone-icon">📱</div>
        <div style="font-size:28px; margin-bottom:10px; color:#CCAA44;">Rotate Your Device</div>
        <div class="rotate-text">Mystery Manor plays best in landscape mode!</div>
    </div>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="audio.js"></script>
    <script src="touch.js"></script>
    <script src="assets.js"></script>
    <script src="map.js"></script>
    <script src="scenes/BootScene.js"></script>
    <script src="scenes/TitleScene.js"></script>
    <script src="scenes/GameScene.js"></script>
    <script src="scenes/AccusationScene.js"></script>
    <script src="scenes/CombatScene.js"></script>
    <script src="scenes/ResultScene.js"></script>
    <script src="game.js"></script>
    <script>
        // Prevent page scroll on arrow keys only (Space handled by game scenes)
        window.addEventListener('keydown', function(e) {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        }, false);

        // Prevent pinch-to-zoom on iOS
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });

        // Prevent pull-to-refresh
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        // Try to lock to landscape (works on Android Chrome, ignored elsewhere)
        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(){});
            }
        } catch(e) {}

        // Init touch controls
        TouchControls.init();
    </script>
</body>
</html>
